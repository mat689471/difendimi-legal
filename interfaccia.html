<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>AGENTE AI ∞</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;user-select:none}
#bg{position:fixed;inset:0;z-index:0}

/* ── HUD ───────────────────────────────────────────────────────────── */
#hud{
  position:fixed;inset:0;z-index:10;pointer-events:none;
  display:grid;
  grid-template-rows:48px 1fr 220px;
  grid-template-columns:260px 1fr 260px;
  gap:6px;padding:6px;
}

/* top bar */
#topbar{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;
  border:1px solid #00ffcc33;background:#00ffcc07;
  backdrop-filter:blur(8px);padding:0 18px;
  color:#00ffcc;font-size:12px;letter-spacing:2px;
}
#topbar .brand{font-size:14px;font-weight:bold;letter-spacing:4px}
#topbar .model{color:#0088ff88;font-size:10px;letter-spacing:5px}
#status-wrap{display:flex;align-items:center;gap:8px}
#dot{width:8px;height:8px;border-radius:50%;background:#ff3333;box-shadow:0 0 6px #ff3333;transition:.4s}
#dot.on{background:#00ffcc;box-shadow:0 0 12px #00ffcc}
#status-txt{font-size:11px;letter-spacing:3px}

/* panels */
.panel{
  border:1px solid #0088ff22;background:#00000a99;
  backdrop-filter:blur(10px);padding:10px 12px;
  overflow:hidden;
}
.panel h3{
  color:#00ffcc;font-size:10px;letter-spacing:4px;
  border-bottom:1px solid #00ffcc22;padding-bottom:5px;margin-bottom:8px;
}
.pitem{
  padding:3px 0;border-bottom:1px solid #ffffff06;
  color:#88ddcc;font-size:10px;word-break:break-all;line-height:1.4;
}
.pitem em{color:#00ffcc88;font-style:normal;margin-right:5px}
.empty{color:#ffffff22;font-size:10px}

#panel-l{grid-row:2;grid-column:1}
#panel-r{grid-row:2;grid-column:3}

/* terminal */
#term{
  grid-row:3;grid-column:1/-1;
  display:flex;flex-direction:column;
  border:1px solid #00ffcc33;background:#00000aee;
  backdrop-filter:blur(12px);pointer-events:all;
}
#out{
  flex:1;overflow-y:auto;padding:8px 14px;
  font-size:11px;line-height:1.7;color:#aaffee;
}
#out::-webkit-scrollbar{width:3px}
#out::-webkit-scrollbar-thumb{background:#00ffcc33}
.lc{color:#00ffcc}.lo{color:#7bc8ff}.le{color:#ff5577}
.li{color:#ffcc44}.ld{color:#00ff88;font-weight:bold}.lx{color:#ff5500}

#irow{
  display:flex;align-items:center;gap:10px;
  border-top:1px solid #00ffcc22;padding:7px 14px;
}
#prompt{color:#00ffcc77;font-size:12px;white-space:nowrap;min-width:100px}
#inp{
  flex:1;background:transparent;border:none;outline:none;
  color:#00ffcc;font-family:'Courier New',monospace;font-size:12px;
  caret-color:#00ffcc;
}
#inp::placeholder{color:#00ffcc33}
#sbtn{
  background:#00ffcc11;border:1px solid #00ffcc44;color:#00ffcc;
  padding:3px 16px;cursor:pointer;font-family:'Courier New',monospace;
  font-size:11px;letter-spacing:2px;transition:.2s;pointer-events:all;
}
#sbtn:hover{background:#00ffcc33}

/* confirm modal */
#modal{
  display:none;position:fixed;inset:0;z-index:50;
  align-items:center;justify-content:center;
  background:#000000cc;backdrop-filter:blur(4px);
  pointer-events:all;
}
#modal.show{display:flex}
#mbox{
  border:1px solid #ff440066;background:#050010ee;
  padding:28px 36px;text-align:center;min-width:420px;
  backdrop-filter:blur(16px);
}
#mbox h4{color:#ff5500;letter-spacing:3px;font-size:13px;margin-bottom:8px}
#mcmd{color:#ffcc44;font-size:11px;margin-bottom:20px;word-break:break-all;max-height:80px;overflow-y:auto}
.mbts{display:flex;gap:14px;justify-content:center}
.mbtn{
  padding:5px 30px;border:1px solid;cursor:pointer;
  font-family:'Courier New',monospace;font-size:12px;
  background:transparent;letter-spacing:2px;transition:.2s;
}
.my{border-color:#00ffcc;color:#00ffcc}.my:hover{background:#00ffcc22}
.mn{border-color:#ff4400;color:#ff4400}.mn:hover{background:#ff440022}

/* scanlines */
body::after{
  content:'';position:fixed;inset:0;z-index:8;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,#00000018 2px,#00000018 4px);
}
/* vignette */
body::before{
  content:'';position:fixed;inset:0;z-index:9;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 55%,#000000cc 100%);
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="hud">
  <div id="topbar">
    <div class="brand">◈ AGENTE AI ∞</div>
    <div class="model">POWERSHELL · AUTONOMOUS · claude-opus-4-8</div>
    <div id="status-wrap">
      <div id="dot"></div>
      <span id="status-txt">OFFLINE</span>
    </div>
  </div>

  <div class="panel" id="panel-l">
    <h3>◈ MEMORIA</h3>
    <div id="mem-list"><div class="empty">— vuota —</div></div>
  </div>

  <div class="panel" id="panel-r">
    <h3>◈ SKILL</h3>
    <div id="skl-list"><div class="empty">— nessuna —</div></div>
  </div>

  <div id="term">
    <div id="out"></div>
    <div id="irow">
      <span id="prompt">OBIETTIVO ›</span>
      <input id="inp" type="text" autocomplete="off" spellcheck="false" placeholder="digita il tuo obiettivo…"/>
      <button id="sbtn">INVIA</button>
    </div>
  </div>
</div>

<div id="modal">
  <div id="mbox">
    <h4>⚠ COMANDO DISTRUTTIVO</h4>
    <div id="mcmd"></div>
    <div class="mbts">
      <button class="mbtn my" id="byes">✓ ESEGUI</button>
      <button class="mbtn mn" id="bno">✗ SALTA</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ── THREE.JS SCENE ────────────────────────────────────────────────────────────
const canvas = document.getElementById('bg');
const R = new THREE.WebGLRenderer({ canvas, antialias: true });
R.setPixelRatio(Math.min(devicePixelRatio, 2));
R.setSize(innerWidth, innerHeight);
R.setClearColor(0x000008);

const S = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 2000);
cam.position.set(0, 2.5, 13);
cam.lookAt(0, 0, 0);

// Stars
const sg = new THREE.BufferGeometry();
const sp = new Float32Array(7000 * 3);
for (let i = 0; i < sp.length; i++) sp[i] = (Math.random() - 0.5) * 900;
sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));
const stars = new THREE.Points(sg, new THREE.PointsMaterial({
  color: 0xffffff, size: 0.45, sizeAttenuation: true, transparent: true, opacity: 0.7
}));
S.add(stars);

// Nebula cloud (large, blurred)
const ng = new THREE.BufferGeometry();
const np = new Float32Array(800 * 3);
for (let i = 0; i < np.length; i += 3) {
  const r = 60 + Math.random() * 120;
  const θ = Math.random() * Math.PI * 2;
  const φ = (Math.random() - 0.5) * Math.PI;
  np[i]   = r * Math.cos(θ) * Math.cos(φ);
  np[i+1] = r * Math.sin(φ) * 0.3;
  np[i+2] = r * Math.sin(θ) * Math.cos(φ);
}
ng.setAttribute('position', new THREE.BufferAttribute(np, 3));
S.add(new THREE.Points(ng, new THREE.PointsMaterial({ color: 0x0044aa, size: 2.5, transparent: true, opacity: 0.25 })));

// Grid floor
const grid = new THREE.GridHelper(200, 60, 0x003355, 0x001122);
grid.position.y = -6.5;
S.add(grid);

// Core outer — icosahedron wireframe
const coreWire = new THREE.Mesh(
  new THREE.IcosahedronGeometry(2.1, 1),
  new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.55 })
);
S.add(coreWire);

// Core inner — solid
const coreInner = new THREE.Mesh(
  new THREE.IcosahedronGeometry(1.5, 0),
  new THREE.MeshStandardMaterial({
    color: 0x001833, emissive: 0x0055cc, emissiveIntensity: 1.2,
    transparent: true, opacity: 0.8, roughness: 0.2, metalness: 0.95
  })
);
S.add(coreInner);

// Orbit rings
function makeRing(r, color, rx, rz, ry) {
  const m = new THREE.Mesh(
    new THREE.TorusGeometry(r, 0.022, 8, 90),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5 })
  );
  m.rotation.x = rx; m.rotation.z = rz || 0; m.rotation.y = ry || 0;
  S.add(m); return m;
}
const ring1 = makeRing(3.5, 0x0088ff, Math.PI / 2.4, 0);
const ring2 = makeRing(4.1, 0xcc00ff, Math.PI / 1.7, Math.PI / 4);
const ring3 = makeRing(2.8, 0x00ffcc, Math.PI / 3, -Math.PI / 5);

// Orbiting nodes (memory dots)
const nodeMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.09, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0x00ffcc })
);
const nodes = Array.from({ length: 10 }, (_, i) => {
  const n = nodeMesh.clone();
  n.userData = {
    angle: (i / 10) * Math.PI * 2,
    radius: 3.3 + Math.random() * 0.9,
    speed: 0.2 + Math.random() * 0.4,
    yOff: (Math.random() - 0.5) * 2.5,
    color: i % 3 === 0 ? 0x0088ff : i % 3 === 1 ? 0xcc00ff : 0x00ffcc
  };
  n.material = new THREE.MeshBasicMaterial({ color: n.userData.color });
  S.add(n); return n;
});

// Lights
S.add(new THREE.AmbientLight(0x001122, 2));
const cLight = new THREE.PointLight(0x00ffcc, 4, 22);
S.add(cLight);
S.add(Object.assign(new THREE.PointLight(0x0033ff, 2.5, 35), { position: new THREE.Vector3(-9, 5, -5) }));
S.add(Object.assign(new THREE.PointLight(0xaa00ff, 2, 28), { position: new THREE.Vector3(9, -3, 6) }));

window.addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  R.setSize(innerWidth, innerHeight);
});

let t = 0;
function tick() {
  requestAnimationFrame(tick);
  t += 0.007;
  coreWire.rotation.y += 0.005; coreWire.rotation.x += 0.002;
  coreInner.rotation.y -= 0.004; coreInner.rotation.z += 0.0015;
  ring1.rotation.z += 0.004;
  ring2.rotation.y += 0.006;
  ring3.rotation.x += 0.003;
  stars.rotation.y += 0.00008;
  cLight.intensity = 3 + Math.sin(t * 1.8) * 1.2;
  nodes.forEach(n => {
    n.userData.angle += n.userData.speed * 0.014;
    n.position.set(
      Math.cos(n.userData.angle) * n.userData.radius,
      n.userData.yOff + Math.sin(t * 0.7 + n.userData.angle) * 0.5,
      Math.sin(n.userData.angle) * n.userData.radius
    );
  });
  cam.position.x = Math.sin(t * 0.09) * 2.2;
  cam.position.y = 2.5 + Math.cos(t * 0.06) * 0.9;
  cam.lookAt(0, 0, 0);
  R.render(S, cam);
}
tick();

// ── UI ────────────────────────────────────────────────────────────────────────
const dot     = document.getElementById('dot');
const stxt    = document.getElementById('status-txt');
const out     = document.getElementById('out');
const inp     = document.getElementById('inp');
const prompt  = document.getElementById('prompt');
const modal   = document.getElementById('modal');
const mcmd    = document.getElementById('mcmd');
const memList = document.getElementById('mem-list');
const sklList = document.getElementById('skl-list');

function online(on) {
  dot.className = on ? 'on' : '';
  stxt.textContent = on ? 'CONNESSO' : 'OFFLINE';
}

function line(txt, cls) {
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = txt;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
}

function renderMem(mem) {
  const keys = Object.keys(mem || {});
  memList.innerHTML = keys.length
    ? keys.map(k => `<div class="pitem"><em>${k}</em>${mem[k]}</div>`).join('')
    : '<div class="empty">— vuota —</div>';
}

function renderSkills(list) {
  sklList.innerHTML = list && list.length
    ? list.map(s => `<div class="pitem"><em>▸</em>${s.name} — ${s.desc}</div>`).join('')
    : '<div class="empty">— nessuna —</div>';
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws, confirmId = null;

function connect() {
  ws = new WebSocket('ws://localhost:8765');

  ws.onopen = () => {
    online(true);
    line('◈ Connessione stabilita con il server agente.', 'li');
  };

  ws.onmessage = ({ data }) => {
    const m = JSON.parse(data);
    switch (m.type) {
      case 'init':
        line('◈ Agente pronto — ' + m.model, 'li');
        renderMem(m.memory);
        renderSkills(m.skills);
        break;
      case 'command':
        line((m.destructive ? '[DISTRUTTIVO] ' : '') + '› ' + m.cmd, m.destructive ? 'lx' : 'lc');
        if (m.reason) line('  Motivo: ' + m.reason, 'lo');
        break;
      case 'destructive':
        confirmId = m.id;
        mcmd.textContent = m.cmd;
        modal.classList.add('show');
        break;
      case 'result':
        if (m.stdout && m.stdout.trim()) line(m.stdout.trim(), 'lo');
        if (m.stderr && m.stderr.trim()) line(m.stderr.trim(), 'le');
        line('  RC=' + m.rc, m.rc === 0 ? 'lo' : 'le');
        break;
      case 'message':
        line('[AGENTE] ' + m.text, 'li');
        prompt.textContent = 'RISPOSTA ›';
        break;
      case 'done':
        line('✓ ' + m.summary, 'ld');
        prompt.textContent = 'OBIETTIVO ›';
        break;
      case 'memory_update':
        renderMem(m.data);
        break;
      case 'skill_saved':
        line('◈ Skill salvata: ' + m.name, 'li');
        renderSkills(m.skills);
        break;
      case 'skipped':
        line('⊘ Comando saltato.', 'lx');
        break;
      case 'error':
        line('✕ ' + m.text, 'le');
        break;
    }
  };

  ws.onclose = () => { online(false); setTimeout(connect, 3500); };
  ws.onerror = () => { online(false); };
}

function send() {
  const v = inp.value.trim();
  if (!v) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    line('✕ Server non raggiungibile — avvia ws_agente.py', 'le'); return;
  }
  line('» ' + v, 'lc');
  ws.send(JSON.stringify({ type: 'objective', text: v }));
  inp.value = '';
  prompt.textContent = 'OBIETTIVO ›';
}

document.getElementById('sbtn').addEventListener('click', send);
inp.addEventListener('keydown', e => e.key === 'Enter' && send());

document.getElementById('byes').addEventListener('click', () => {
  if (!confirmId) return;
  ws.send(JSON.stringify({ type: 'confirm', id: confirmId, answer: 's' }));
  line('✓ Comando confermato.', 'li');
  modal.classList.remove('show'); confirmId = null;
});

document.getElementById('bno').addEventListener('click', () => {
  if (!confirmId) return;
  ws.send(JSON.stringify({ type: 'confirm', id: confirmId, answer: 'n' }));
  line('⊘ Comando rifiutato.', 'lx');
  modal.classList.remove('show'); confirmId = null;
});

connect();
</script>
</body>
</html>
